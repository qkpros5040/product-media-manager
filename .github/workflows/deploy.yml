# GitHub Actions workflow for deploying Product Media Manager
# This workflow builds and deploys the plugin on push to main

name: Deploy Product Media Manager

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, json, dom

      - name: Install dependencies (npm)
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Build assets (if applicable)
        run: |
          if [ -f package.json ]; then npm run build || true; fi

      - name: Lint PHP
        run: |
          if [ -f composer.json ]; then composer install --no-interaction; fi
          find . -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Archive plugin
        run: |
          zip -r product-media-manager.zip . -x '*.git*' 'node_modules/*' '*.github*' '*.DS_Store'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: product-media-manager
          path: product-media-manager.zip

      # --- Deployment step example ---
      # Uncomment and configure the following step for your deployment target
      # - name: Deploy to server
      #   uses: easingthemes/ssh-deploy@v4
      #   with:
      #     ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     remote-user: ${{ secrets.REMOTE_USER }}
      #     server-ip: ${{ secrets.SERVER_IP }}
      #     remote-path: /var/www/html/wp-content/plugins/product-media-manager
      #     local-path: ./
      #     exclude: .git*,node_modules,*.DS_Store,*.github

      # Add more deployment steps as needed
      - name: Deploy via SSH (git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /domains/nobleliftcanada.com/public_html/wp-content/plugins/product-media-manager
            git pull origin main
