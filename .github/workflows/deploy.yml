# GitHub Actions workflow for deploying Product Media Manager
# This workflow builds and deploys the plugin on push to main

name: Deploy Product Media Manager

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: prod 
    steps:

      # --- Deployment step example ---
      # Uncomment and configure the following step for your deployment target
      # - name: Deploy to server
      #   uses: easingthemes/ssh-deploy@v4
      #   with:
      #     ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      #     remote-user: ${{ secrets.REMOTE_USER }}
      #     server-ip: ${{ secrets.SERVER_IP }}
      #     remote-path: /var/www/html/wp-content/plugins/product-media-manager
      #     local-path: ./
      #     exclude: .git*,node_modules,*.DS_Store,*.github

      # Add more deployment steps as needed
      - name: Deploy via SSH (git pull)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT != '' && secrets.SSH_PORT || 22 }}
          script: cd /domains/nobleliftcanada.com/public_html/wp-content/plugins/product-media-manager
           && pwd
           && git pull origin main